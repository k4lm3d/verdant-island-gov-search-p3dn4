name: Clone Hugging Face Space

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clone:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone HF Space
        run: |
          git clone https://huggingface.co/spaces/verdant-island/verdant-island-gov-search-p3dn4 /tmp/hf-space

      - name: Checkout specific commit
        run: |
          cd /tmp/hf-space
          git checkout 2461c8c19a4994d563f325d9b07e81b1ef6e5234

      - name: Copy files
        run: |
          rsync -av \
            --exclude='.git' \
            /tmp/hf-space/ ./

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "Clone HF Space at commit 2461c8c"

      - name: Push to GitHub
        run: |
          git push
